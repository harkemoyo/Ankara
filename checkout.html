<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Checkout – Mary Humphrey Wear</title>

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="theme-color" content="#3C3836">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/swiper-bundle.min.css">
    <link rel="stylesheet" href="assets/glightbox.min.css">
    <link rel="stylesheet" href="assets/bootstrap.min.css">
    <link rel="stylesheet" href="assets/normalize.css">
    <link rel="stylesheet" href="assets/style.css">
    <style>
        :root {
            --primary-color:         #422326;
            --secondary-color:       #bcadae;
            --hover-color:           #5c3539;
            --yellow-color:          #D4A843;
            --foreground-color:      #2a2624;
            --foreground-sub-color:  #7a726e;
            --text-white-color:      #fff;
            --body-background-color: #f5f1ec;
            --bg-offwhite-color:     #faf8f5;
            --bg-gray-color:         #f5f1ec;
            --bg-black-color:        #2a1719;
            --bg-light-dark-color:   #422326;
            --border-color:          #dad2ce;
            --frank-ruhl-fonts: 'Fraunces', serif;
            --karma-fonts:      'Figtree', sans-serif;
        }
        body {
            font-family: var(--karma-fonts);
            color: var(--foreground-color);
            background-color: var(--body-background-color);
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--frank-ruhl-fonts);
            color: var(--primary-color);
        }
    </style>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Securely complete your Ankara Store order.">
  
  
  
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --accent: #1a1a1a;
      --border: #e0e0e0;
      --bg: #f9f9f9;
      --radius: 4px;
      --green: #27ae60;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: #1a1a1a; }

    /* ── LAYOUT ── */
    .checkout-wrap {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 0;
      min-height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (max-width: 800px) {
      .checkout-wrap { grid-template-columns: 1fr; }
      .order-summary { order: -1; border-bottom: 1px solid var(--border); }
    }

    /* ── LEFT: FORM ── */
    .checkout-form-col {
      padding: 48px 40px 80px;
      border-right: 1px solid var(--border);
      background: #fff;
    }
    .checkout-logo { font-family: 'Karma', serif; font-size: 2.2rem; margin-bottom: 32px; display: block; color: #1a1a1a; text-decoration: none; }
    .step-label { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.12em; color: #999; margin-bottom: 6px; }
    .section-title { font-family: 'Karma', serif; font-size: 2rem; margin: 0 0 24px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 1.2rem; color: #666; font-weight: 500; }
    .form-group input, .form-group select {
      padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 1.4rem; font-family: 'Inter', sans-serif; transition: border 0.2s; background: #fff;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none; border-color: #1a1a1a;
    }
    .form-group input.error { border-color: #e74c3c; }

    .section-divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

    .shipping-option {
      display: flex; align-items: center; gap: 14px; padding: 14px 16px;
      border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; cursor: pointer;
    }
    .shipping-option input[type=radio] { accent-color: #1a1a1a; width: 16px; height: 16px; }
    .shipping-option .ship-label { flex: 1; font-size: 1.3rem; }
    .shipping-option .ship-price { font-size: 1.3rem; font-weight: 600; }

    .pay-btn {
      width: 100%; padding: 16px; background: #1a1a1a; color: #fff; border: none;
      font-size: 1.5rem; font-weight: 600; cursor: pointer; border-radius: var(--radius);
      margin-top: 24px; transition: opacity 0.2s; letter-spacing: 0.05em;
    }
    .pay-btn:hover { opacity: 0.85; }
    .pay-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .pay-btn .spinner {
      display: inline-block; width: 16px; height: 16px; border: 2px solid #ffffff55;
      border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .secure-note { text-align: center; font-size: 1.2rem; color: #999; margin-top: 12px; }
    .secure-note svg { vertical-align: middle; margin-right: 4px; }

    /* ── RIGHT: ORDER SUMMARY ── */
    .order-summary {
      padding: 48px 32px;
      background: #f5f5f5;
    }
    .order-summary h2 { font-family: 'Karma', serif; font-size: 1.8rem; margin: 0 0 24px; }
    .summary-item {
      display: flex; align-items: center; gap: 14px; margin-bottom: 16px;
    }
    .summary-item img {
      width: 64px; height: 64px; object-fit: cover; border-radius: 4px;
      border: 1px solid var(--border); background: #fff;
    }
    .summary-item .item-info { flex: 1; }
    .summary-item .item-title { font-size: 1.3rem; font-weight: 500; line-height: 1.4; }
    .summary-item .item-variant { font-size: 1.2rem; color: #777; }
    .summary-item .item-price { font-size: 1.3rem; font-weight: 600; }
    .summary-qty {
      display: inline-block; background: #1a1a1a; color: #fff;
      font-size: 1.1rem; border-radius: 50%; width: 20px; height: 20px;
      line-height: 20px; text-align: center; position: relative; top: -8px; right: -6px; float: right;
    }

    .summary-divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .summary-row { display: flex; justify-content: space-between; font-size: 1.3rem; margin-bottom: 8px; color: #555; }
    .summary-row.total { font-size: 1.6rem; font-weight: 700; color: #1a1a1a; margin-top: 12px; }

    /* ── EMPTY CART ALERT ── */
    #empty-cart-msg { display: none; text-align: center; padding: 60px 20px; }
  </style>
</head>
<body>

<!-- Empty cart fallback -->
<div id="empty-cart-msg">
  <h2 style="font-family:'Karma',serif;font-size:2.4rem;margin-bottom:16px;">Your bag is empty</h2>
  <p style="font-size:1.4rem;color:#777;margin-bottom:24px;">Add some items before checking out.</p>
  <a href="shop.html" style="background:#1a1a1a;color:#fff;padding:14px 32px;text-decoration:none;font-size:1.4rem;">Shop Now</a>
</div>

<div class="checkout-wrap" id="checkout-wrap">

  <!-- ── LEFT: FORM ── -->
  <div class="checkout-form-col">
    <a href="index.html" class="checkout-logo">Ankara</a>

    <div class="step-label">Step 1</div>
    <h1 class="section-title">Contact & Delivery</h1>

    <form id="checkout-form" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="first-name">First Name *</label>
          <input type="text" id="first-name" name="first_name" required autocomplete="given-name">
        </div>
        <div class="form-group">
          <label for="last-name">Last Name *</label>
          <input type="text" id="last-name" name="last_name" required autocomplete="family-name">
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="your@email.com">
      </div>

      <div class="form-group">
        <label for="phone">Phone Number (optional)</label>
        <input type="tel" id="phone" name="phone" autocomplete="tel" placeholder="+44 7700 900000">
      </div>

      <hr class="section-divider">
      <div class="step-label">Step 2</div>
      <h2 class="section-title" style="font-size:1.8rem;">Shipping Address</h2>

      <div class="form-group">
        <label for="address1">Address Line 1 *</label>
        <input type="text" id="address1" name="address1" required autocomplete="address-line1">
      </div>
      <div class="form-group">
        <label for="address2">Address Line 2</label>
        <input type="text" id="address2" name="address2" autocomplete="address-line2">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="city">City *</label>
          <input type="text" id="city" name="city" required autocomplete="address-level2">
        </div>
        <div class="form-group">
          <label for="postcode">Postcode *</label>
          <input type="text" id="postcode" name="postcode" required autocomplete="postal-code">
        </div>
      </div>
      <div class="form-group">
        <label for="country">Country *</label>
        <select id="country" name="country" required autocomplete="country">
          <option value="GB" selected>United Kingdom</option>
          <option value="US">United States</option>
          <option value="GH">Ghana</option>
          <option value="NG">Nigeria</option>
          <option value="CA">Canada</option>
          <option value="AU">Australia</option>
          <option value="ZA">South Africa</option>
        </select>
      </div>

      <hr class="section-divider">
      <div class="step-label">Step 3</div>
      <h2 class="section-title" style="font-size:1.8rem;">Shipping Method</h2>

      <label class="shipping-option" id="ship-standard">
        <input type="radio" name="shipping" value="standard" checked>
        <span class="ship-label">Standard Delivery (3–5 days)</span>
        <span class="ship-price" id="ship-standard-price">£5.99</span>
      </label>
      <label class="shipping-option">
        <input type="radio" name="shipping" value="free" id="ship-free-radio" disabled>
        <span class="ship-label">Free Delivery <small style="color:#27ae60;">(orders over £80)</small></span>
        <span class="ship-price">FREE</span>
      </label>

      <hr class="section-divider">

      <button type="submit" class="pay-btn" id="pay-btn">
        Pay with Paystack
      </button>
      <p class="secure-note">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Secured by Paystack · SSL encrypted
      </p>
    </form>
  </div>

  <!-- ── RIGHT: ORDER SUMMARY ── -->
  <aside class="order-summary">
    <h2>Your Order</h2>
    <div id="summary-items"><!-- JS renders cart items here --></div>
    <hr class="summary-divider">
    <div class="summary-row"><span>Subtotal</span><span id="sum-subtotal">£0.00</span></div>
    <div class="summary-row"><span>Shipping</span><span id="sum-shipping">£5.99</span></div>
    <hr class="summary-divider">
    <div class="summary-row total"><span>Total</span><span id="sum-total">£0.00</span></div>
  </aside>

</div>

<!-- Paystack script -->
<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="assets/cart.js"></script>
<script>
  // ─── CONFIG — paste your public values here ───────────────────
  const PAYSTACK_PUBLIC_KEY = 'pk_test_YOUR_PAYSTACK_PUBLIC_KEY';
  // ─────────────────────────────────────────────────────────────

  const cart = getCart();

  // Redirect if empty
  if (!cart || cart.length === 0) {
    document.getElementById('checkout-wrap').style.display = 'none';
    document.getElementById('empty-cart-msg').style.display = 'block';
  }

  // ── Render cart in summary ──
  const subtotal = cart.reduce((s, i) => s + parseFloat(i.price) * i.qty, 0);
  const freeShipping = subtotal >= 80;
  const shippingCost = freeShipping ? 0 : 5.99;
  const total = subtotal + shippingCost;

  document.getElementById('sum-subtotal').textContent = `£${subtotal.toFixed(2)}`;
  document.getElementById('sum-shipping').textContent = freeShipping ? 'FREE' : '£5.99';
  document.getElementById('sum-total').textContent    = `£${total.toFixed(2)}`;
  document.getElementById('ship-standard-price').textContent = freeShipping ? 'FREE' : '£5.99';
  if (freeShipping) {
    document.getElementById('ship-free-radio').disabled = false;
    document.getElementById('ship-free-radio').checked = true;
  }

  document.getElementById('summary-items').innerHTML = cart.map(item => `
    <div class="summary-item">
      <div style="position:relative;">
        <img src="${item.image}" alt="${item.title}">
        <span class="summary-qty">${item.qty}</span>
      </div>
      <div class="item-info">
        <div class="item-title">${item.title}</div>
        <div class="item-variant">${item.size || ''} ${item.color ? '· ' + item.color : ''}</div>
      </div>
      <div class="item-price">£${(parseFloat(item.price) * item.qty).toFixed(2)}</div>
    </div>
  `).join('');

  // ── Form submit → Paystack → verify → create order ──
  document.getElementById('checkout-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const btn = document.getElementById('pay-btn');

    // Basic validation
    const requiredFields = ['first-name','last-name','email','address1','city','postcode'];
    let valid = true;
    requiredFields.forEach(id => {
      const el = document.getElementById(id);
      if (!el.value.trim()) { el.classList.add('error'); valid = false; }
      else el.classList.remove('error');
    });
    if (!valid) { alert('Please fill in all required fields.'); return; }

    // Disable button + show spinner
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Opening Paystack...';

    const customer = {
      name:     document.getElementById('first-name').value.trim() + ' ' + document.getElementById('last-name').value.trim(),
      email:    document.getElementById('email').value.trim().toLowerCase(),
      phone:    document.getElementById('phone').value.trim(),
      address1: document.getElementById('address1').value.trim(),
      address2: document.getElementById('address2').value.trim(),
      city:     document.getElementById('city').value.trim(),
      postcode: document.getElementById('postcode').value.trim(),
      country:  document.getElementById('country').value,
    };

    // Paystack popup
    const handler = PaystackPop.setup({
      key:       PAYSTACK_PUBLIC_KEY,
      email:     customer.email,
      amount:    Math.round(total * 100),   // in kobo/pence
      currency:  'GBP',
      ref:       'ANK-' + Date.now(),
      metadata:  { customer_name: customer.name, cart_count: cart.length },

      callback: async function(response) {
        btn.innerHTML = '<span class="spinner"></span> Confirming order...';

        try {
          const res = await fetch('/api/checkout', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              reference: response.reference,
              cart,
              customer
            })
          });

          const data = await res.json();

          if (res.ok && data.success) {
            // Clear cart and redirect to thank-you page
            localStorage.removeItem('mhw-cart');
            window.location.href = `/thank-you.html?order=${data.order_number}`;
          } else {
            alert('Payment received but order creation failed: ' + (data.error || 'Unknown error'));
            btn.disabled = false;
            btn.innerHTML = 'Pay with Paystack';
          }
        } catch(err) {
          alert('Network error. Please contact support with your payment reference: ' + response.reference);
          btn.disabled = false;
          btn.innerHTML = 'Pay with Paystack';
        }
      },

      onClose: function() {
        btn.disabled = false;
        btn.innerHTML = 'Pay with Paystack';
      }
    });

    handler.openIframe();
  });
</script>
</body>
</html>
